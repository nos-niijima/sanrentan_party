services:
  # PostgreSQL データベース
  postgres:
    image: postgres:15-alpine
    container_name: sanrentan-party-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sanrentan_party
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d sanrentan_party"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: sanrentan-party-network
